name: Keep backend alive

# Render's free tier spins the service down after ~15 minutes without
# traffic. This workflow pings the backend health endpoint every 10 minutes
# so the instance never goes idle during the day.
#
# Setup: add a repository variable named BACKEND_URL with the public base
# URL of the Render service (e.g. https://my-backend.onrender.com).
# Settings -> Secrets and variables -> Actions -> Variables.

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs by a few minutes,
    # which is still well within Render's ~15 minute idle window.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        env:
          # Works whether BACKEND_URL was created as a repository variable
          # (Settings -> Secrets and variables -> Actions -> Variables tab)
          # or as a repository secret (Secrets tab).
          BACKEND_URL: ${{ vars.BACKEND_URL || secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL is not set. Create it in Settings -> Secrets and variables -> Actions, either in the 'Variables' tab or the 'Secrets' tab, with the public URL of the Render service (e.g. https://my-backend.onrender.com)."
            exit 1
          fi
          # Retry a few times: the first hit may be a cold start (~1 min on Render)
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 15 --retry-all-errors \
            --max-time 120 \
            "${BACKEND_URL%/}/health"
          echo "Backend is awake."

