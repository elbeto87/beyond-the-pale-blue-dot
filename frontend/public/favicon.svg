      <stop offset="100%" stop-color="#2b7fff"/>
    </radialGradient>
    <linearGradient id="tail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b7fff" stop-opacity="0"/>
      <stop offset="60%" stop-color="#6fb7ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
