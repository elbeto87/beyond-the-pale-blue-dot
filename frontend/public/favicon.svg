  <circle cx="20" cy="46" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="9"  cy="34" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="30" cy="10" r="0.9" fill="#ffffff" opacity="0.7"/>

