services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beyond_the_pale_blue_dot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d beyond_the_pale_blue_dot"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build: backend
    command: alembic upgrade head
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env

  api:
    build: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: frontend
      args:
        API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    environment:
      # App uses relative URLs; the dev-server proxy forwards them to the backend.
      - VITE_API_URL=
      - API_PROXY_TARGET=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
