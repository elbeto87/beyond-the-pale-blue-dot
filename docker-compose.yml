services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: end_of_the_world
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d end_of_the_world" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    build: .
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
